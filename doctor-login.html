<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doctor Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="login-container">
    <h2>Doctor Login</h2>
    <form id="doctorLoginForm">
      <input type="email" id="doctorEmail" placeholder="Enter doctor email" required />
      <input type="password" id="doctorPassword" placeholder="Enter password" required />
      <button type="submit" class="btn doctor-btn">Login as Doctor</button>
    </form>
    <p><a href="doctor-signup.html">Create Doctor Account</a></p>
    <p class="switch-role">Are you a patient? <a href="patient-login.html">Patient Login</a></p>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
