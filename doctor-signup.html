<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doctor Sign Up</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="login-container">
    <h2>Doctor Sign Up</h2>
    <form id="doctorSignupForm">
      <input type="text" id="doctorSignupName" placeholder="Doctor Name" required />
      <input type="email" id="doctorSignupEmail" placeholder="Email" required />
      <input type="password" id="doctorSignupPassword" placeholder="Password" required />
      <input type="text" id="doctorSpecialization" placeholder="Specialization" required />
      <button type="submit" class="btn doctor-btn">Create Doctor Account</button>
    </form>
    <p><a href="doctor-login.html">Already have an account? Doctor Login</a></p>
    <p class="switch-role">Are you a patient? <a href="patient-signup.html">Patient Sign Up</a></p>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
