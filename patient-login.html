<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="login-container">
    <h2>Patient Login</h2>
    <form id="patientLoginForm">
      <input type="email" id="patientEmail" placeholder="Enter patient email" required />
      <input type="password" id="patientPassword" placeholder="Enter password" required />
      <button type="submit" class="btn">Login as Patient</button>
    </form>
    <p><a href="patient-signup.html">Create Patient Account</a></p>
    <p class="switch-role">Are you a doctor? <a href="doctor-login.html">Doctor Login</a></p>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
