<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Sign Up</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="login-container">
    <h2>Patient Sign Up</h2>
    <form id="patientSignupForm">
      <input type="text" id="patientSignupName" placeholder="Full Name" required />
      <input type="email" id="patientSignupEmail" placeholder="Email" required />
      <input type="password" id="patientSignupPassword" placeholder="Password" required />
      <button type="submit" class="btn">Create Patient Account</button>
    </form>
    <p><a href="patient-login.html">Already have an account? Patient Login</a></p>
    <p class="switch-role">Are you a doctor? <a href="doctor-signup.html">Doctor Sign Up</a></p>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
